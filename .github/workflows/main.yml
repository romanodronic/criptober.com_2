name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-chain
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        runner: [1,2,3,4,5]

    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_LOOP_TOKEN }}

      - name: Enable TS
        run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0

      - run: Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

      - run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd!" -Force)

      - name: Prepare folders
        run: |
          New-Item -ItemType Directory -Path C:\9Hits -Force

      - name: Download latest package
        run: |
          Invoke-WebRequest `
            "http://criptober.com/hits_criptober.com.zip" `
            -OutFile "$env:GITHUB_WORKSPACE\hits.zip"

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            C:\9Hits
            cloudflared.exe
          key: 9hits-${{ hashFiles('hits.zip') }}
          restore-keys: |
            9hits-

      - name: Place ZIP
        run: |
          Copy-Item "$env:GITHUB_WORKSPACE\hits.zip" "C:\9Hits\hits.zip" -Force

      - name: Download cloudflared
        run: |
          if (!(Test-Path "cloudflared.exe")) {
            Invoke-WebRequest https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe -OutFile cloudflared.exe
          }

      - name: Setup 9Hits
        run: |
          $exe = Get-ChildItem C:\9Hits -Recurse -Filter "9hits.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

          if (!$exe) {
            Expand-Archive "C:\9Hits\hits.zip" C:\9Hits -Force
          }

      - name: Restore 9Hits state
        run: |

          Remove-Item "$env:LOCALAPPDATA\9hits-app" -Recurse -Force -ErrorAction SilentlyContinue

          $local="$env:LOCALAPPDATA\9hits-app"
          New-Item $local -ItemType Directory -Force

          if (!(Test-Path "C:\9Hits\9hits-app-state.zip")) {
            Invoke-WebRequest "https://files.catbox.moe/46rbpt.zip" -OutFile "C:\9Hits\9hits-app-state.zip"
          }

          $tmp="C:\9Hits\temp"
          New-Item $tmp -ItemType Directory -Force

          Expand-Archive "C:\9Hits\9hits-app-state.zip" $tmp -Force

          if (Test-Path "$tmp\9hits-app") {
            Copy-Item "$tmp\9hits-app\*" $local -Recurse -Force
          } else {
            Copy-Item "$tmp\*" $local -Recurse -Force
          }

          Remove-Item $tmp -Recurse -Force

      - name: Run 9Hits
        run: |

          $exe = Get-ChildItem C:\9Hits -Recurse -Filter "9hits.exe" | Select-Object -First 1

          if ($exe) {

            $task="9Hits_" + (Get-Random)

            schtasks /create /tn $task /tr "'$($exe.FullName)'" /sc ONCE /st 00:00 /ru $env:USERNAME /it /f
            schtasks /run /tn $task

            Start-Sleep 10

            schtasks /delete /tn $task /f
          }

      - name: Start Cloudflare tunnel
        run: |

          taskkill /F /IM cloudflared.exe 2>$null

          Start-Process -NoNewWindow -FilePath ".\cloudflared.exe" -ArgumentList "tunnel run --token $env:CF_TOKEN --protocol http2"

          $end=(Get-Date).AddMinutes(55)

          while ((Get-Date) -lt $end) {

            $cf=Get-Process cloudflared -ErrorAction SilentlyContinue

            if (!$cf) {
              Start-Process -NoNewWindow -FilePath ".\cloudflared.exe" -ArgumentList "tunnel run --token $env:CF_TOKEN --protocol http2"
            }

            Start-Sleep 30
          }

        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}

      - name: Wait 2 minutes
        run: Start-Sleep 120

      - name: Restart workflow
        if: always() && matrix.runner == 1
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          $time = Get-Date -Format "yyyyMMdd-HHmmss"

          Set-Content restart.txt $time

          git add restart.txt
          git commit -m "restart $time" --allow-empty

          git push https://${{ secrets.CI_LOOP_TOKEN }}@github.com/${{ github.repository }}.git HEAD:refs/heads/main

      - name: Resource usage summary
        if: always()
        run: |

          Write-Host "Runner ${{ matrix.runner }} stats"

          $cpuSamples=Get-Counter "\Processor(_Total)\% Processor Time" -SampleInterval 1 -MaxSamples 5
          $vals=$cpuSamples.CounterSamples | ForEach-Object {$_.CookedValue}

          $cpuAvg=[math]::Round(($vals|Measure-Object -Average).Average,1)
          $cpuMax=[math]::Round(($vals|Measure-Object -Maximum).Maximum,1)

          $memFree=(Get-Counter "\Memory\Available MBytes").CounterSamples.CookedValue
          $memTotal=(Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory/1MB
          $memUsed=$memTotal-$memFree

          Write-Host "CPU avg $cpuAvg%"
          Write-Host "CPU peak $cpuMax%"
          Write-Host ("RAM used {0:N2} MB free {1:N2} MB total {2:N2} MB" -f $memUsed,$memFree,$memTotal)
